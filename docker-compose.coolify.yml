# Coolify deployment compose file for hermes-nulab.
# Uses build directives with Dockerfiles from the git repo.
# All services use named Docker volumes for persistence.

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:18642:18642"
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-501}
      - HERMES_GID=${HERMES_GID:-20}
      - API_SERVER_ENABLED=${API_SERVER_ENABLED:-true}
      - API_SERVER_HOST=${API_SERVER_HOST:-0.0.0.0}
      - API_SERVER_PORT=${API_SERVER_PORT:-18642}
      - API_SERVER_KEY=${API_SERVER_KEY:-dev-only-hermes-nulab}
      - API_SERVER_MODEL_NAME=${API_SERVER_MODEL_NAME:-hermes-nulab}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - GATEWAY_ALLOW_ALL_USERS=${GATEWAY_ALLOW_ALL_USERS:-true}
      - HINDSIGHT_LLM_API_KEY=${DEEPSEEK_API_KEY}
      - HINDSIGHT_API_LLM_API_KEY=${DEEPSEEK_API_KEY}
      - OPENPASS_MCP_TOKEN=Bearer ${OPENPASS_MCP_TOKEN}

  webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    network_mode: bridge
    ports:
      - "8787:8787"
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_HOME=/opt/data
      - HERMES_WEBUI_STATE_DIR=/opt/data
      - HERMES_WEBUI_AUTO_INSTALL=1
      - WANTED_UID=${HERMES_UID:-501}
      - WANTED_GID=${HERMES_GID:-20}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      - gateway

  openpass:
    build:
      context: .
      dockerfile: Dockerfile.openpass
    network_mode: bridge
    ports:
      - "127.0.0.1:8788:8788"
    volumes:
      - hermes-openpass:/root/.openpass
    environment:
      - OPENPASS_VAULT=/root/.openpass
      - OPENPASS_PASSPHRASE=${OPENPASS_PASSPHRASE}
    command: ["serve", "--bind", "0.0.0.0", "--port", "8788"]
    restart: unless-stopped

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    network_mode: bridge
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - hermes-hindsight:/home/hindsight/.pg0
    environment:
      - HINDSIGHT_API_LLM_PROVIDER=deepseek
      - HINDSIGHT_API_LLM_API_KEY=${DEEPSEEK_API_KEY}
      - HINDSIGHT_API_LLM_MODEL=deepseek-v4-flash
    restart: unless-stopped

volumes:
  hermes-data:
  hermes-openpass:
  hermes-hindsight:
