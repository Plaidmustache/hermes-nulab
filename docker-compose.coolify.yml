# Coolify deployment compose file for hermes-nulab.
# Uses Docker Compose networking — services communicate by name.

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    volumes:
      - hermes-data:/opt/data
      - hermes-agent-src:/opt/hermes
    environment:
      - HERMES_UID=${HERMES_UID:-501}
      - HERMES_GID=${HERMES_GID:-20}
      - API_SERVER_ENABLED=${API_SERVER_ENABLED:-true}
      - API_SERVER_HOST=${API_SERVER_HOST:-0.0.0.0}
      - API_SERVER_PORT=${API_SERVER_PORT:-18642}
      - API_SERVER_KEY=${API_SERVER_KEY:-dev-only-hermes-nulab}
      - API_SERVER_MODEL_NAME=${API_SERVER_MODEL_NAME:-hermes-nulab}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - GATEWAY_ALLOW_ALL_USERS=${GATEWAY_ALLOW_ALL_USERS:-true}
      - HINDSIGHT_LLM_API_KEY=${DEEPSEEK_API_KEY}
      - HINDSIGHT_API_LLM_API_KEY=${DEEPSEEK_API_KEY}
      - OPENPASS_MCP_TOKEN=Bearer ${OPENPASS_MCP_TOKEN}
    command:
      - sh
      - -c
      - |
        chmod 755 /opt/data
        chmod 644 /opt/data/config.yaml /opt/data/settings.json /opt/data/SOUL.md 2>/dev/null || true
        /opt/hermes/.venv/bin/hermes config set model.provider "deepseek"
        /opt/hermes/.venv/bin/hermes config set model.default "deepseek-v4-flash"
        /opt/hermes/.venv/bin/hermes config set model.base_url "https://api.deepseek.com"
        chmod -R a+rX /opt/hermes
        exec /opt/hermes/.venv/bin/hermes gateway run
    restart: unless-stopped

  webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    volumes:
      - hermes-data:/opt/data
      - hermes-agent-src:/home/hermeswebui/.hermes/hermes-agent
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_HOME=/opt/data
      - HERMES_WEBUI_STATE_DIR=/opt/data
      - HERMES_WEBUI_AUTO_INSTALL=1
      - HERMES_WEBUI_PASSWORD=Sillyauth2020?
      - WANTED_UID=${HERMES_UID:-501}
      - WANTED_GID=${HERMES_GID:-20}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      - gateway
    restart: unless-stopped

  webui_auth:
    image: caddy:2-alpine
    ports:
      - "8787:80"
    command:
      - sh
      - -c
      - |
        cat >/etc/caddy/Caddyfile <<CEOF
        :80 {
          reverse_proxy webui:8787
        }
        CEOF
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    depends_on:
      - webui
    restart: unless-stopped

  openpass:
    build:
      context: .
      dockerfile: Dockerfile.openpass
    volumes:
      - hermes-openpass:/root/.openpass
    environment:
      - OPENPASS_VAULT=/root/.openpass
      - OPENPASS_PASSPHRASE=${OPENPASS_PASSPHRASE}
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ ! -f /root/.openpass/identity.age ]; then
          echo "$${OPENPASS_PASSPHRASE}" | openpass init /root/.openpass --auth passphrase
        fi
        exec openpass serve --bind 0.0.0.0 --port 8788
    restart: unless-stopped

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    volumes:
      - hermes-hindsight:/home/hindsight/.pg0
    environment:
      - HINDSIGHT_API_LLM_PROVIDER=deepseek
      - HINDSIGHT_API_LLM_API_KEY=${DEEPSEEK_API_KEY}
      - HINDSIGHT_API_LLM_MODEL=deepseek-v4-flash
    restart: unless-stopped

volumes:
  hermes-data:
  hermes-agent-src:
  hermes-openpass:
  hermes-hindsight:
